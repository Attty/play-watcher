name: runner-ip

# Tiny on-demand job: prints the runner's public IP and exits fast, so the run
# completes and its log is fetchable. Separate concurrency group → does NOT
# queue behind the long-running watcher loop.
on:
  workflow_dispatch: {}

jobs:
  ip:
    runs-on: ubuntu-latest
    steps:
      - name: Runner public IP
        run: echo "RUNNER_PUBLIC_IP=$(curl -s https://api.ipify.org)"
